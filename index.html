<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Questboard helps friend groups plan tabletop, gaming, painting, and hobby events." />
    <title>Questboard</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-status" style="box-sizing: border-box; min-height: 100vh; padding: 2rem; background: #16120f; color: #f7efe1; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
        <p style="margin: 0; color: #f0b35a; font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;">Loading Questboard…</p>
      </div>
    </div>
    <script>
      window.setTimeout(() => {
        const root = document.getElementById('root');

        const bootStatus = document.getElementById('boot-status');

        if (!root || (!bootStatus && (root.childElementCount > 0 || root.textContent.trim()))) {
          return;
        }

        const sourceEntrypoint = Array.from(document.querySelectorAll('script[type="module"][src]')).some((script) => {
          try {
            return new URL(script.getAttribute('src'), window.location.href).pathname.endsWith('/src/main.tsx');
          } catch {
            return false;
          }
        });

        if (sourceEntrypoint && !window.location.pathname.endsWith('/dist/')) {
          const fallbackUrl = new URL('dist/', window.location.href);
          fallbackUrl.search = window.location.search;
          fallbackUrl.hash = window.location.hash;
          window.location.replace(fallbackUrl);
          return;
        }

        const title = sourceEntrypoint ? 'Deployment fallback check' : 'Loading check';
        const message = sourceEntrypoint
          ? 'This page is serving the source <code style="color: #f8d49a;">/src/main.tsx</code> entrypoint instead of the built Vite files, and the committed <code style="color: #f8d49a;">/dist/</code> fallback could not be opened automatically.'
          : 'The built Questboard app did not start. On GitHub Pages, that usually means the deployed asset path is wrong, the JavaScript bundle failed to download, or the build finished without the expected Vite environment variables.';
        const nextSteps = sourceEntrypoint
          ? '<li>Open <a style="color: #f8d49a;" href="./dist/">the committed dist fallback</a>.</li><li>Open the repository on GitHub.</li><li>Go to <strong>Settings → Pages</strong>.</li><li>Set <strong>Build and deployment → Source</strong> to <strong>GitHub Actions</strong>.</li><li>Go to <strong>Actions</strong> and rerun the Pages deployment workflow.</li>'
          : '<li>Open the browser developer tools and check the Console and Network tabs for failed JavaScript assets.</li><li>If assets return 404, verify the repository variable <strong>VITE_BASE_PATH</strong> matches the Pages URL.</li><li>Go to <strong>Actions</strong> and confirm the Pages deployment workflow completed successfully.</li><li>Rerun the Pages deployment workflow after changing repository or environment variables.</li>';

        root.innerHTML = `
          <main style="box-sizing: border-box; min-height: 100vh; padding: 2rem; background: #16120f; color: #f7efe1; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
            <section style="max-width: 760px; margin: 0 auto; padding: 1.5rem; border: 1px solid rgba(240, 179, 90, 0.35); border-radius: 1rem; background: rgba(43, 31, 24, 0.92); box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);">
              <p style="margin: 0 0 0.75rem; color: #f0b35a; font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;">${title}</p>
              <h1 style="margin: 0 0 1rem; font-size: clamp(2rem, 5vw, 3.25rem); line-height: 1;">Questboard did not finish loading.</h1>
              <p style="margin: 0 0 1rem; color: #e4d1b8; line-height: 1.6;">${message}</p>
              <ol style="margin: 0 0 1rem 1.25rem; padding: 0; color: #f7efe1; line-height: 1.65;">${nextSteps}</ol>
              <p style="margin: 0; color: #bfa98d; line-height: 1.6;">
                If you use a custom domain or user/organization page, set the repository variable
                <code style="color: #f8d49a;">VITE_BASE_PATH=/</code>. For project pages, omit it so Vite uses the repository name.
              </p>
            </section>
          </main>
        `;
      }, 250);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Questboard helps friend groups plan tabletop, gaming, painting, and hobby events." />
    <title>Questboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.setTimeout(() => {
        const root = document.getElementById('root');

        if (!root || root.childElementCount > 0 || root.textContent.trim()) {
          return;
        }

        root.innerHTML = `
          <main style="box-sizing: border-box; min-height: 100vh; padding: 2rem; background: #16120f; color: #f7efe1; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
            <section style="max-width: 760px; margin: 0 auto; padding: 1.5rem; border: 1px solid rgba(240, 179, 90, 0.35); border-radius: 1rem; background: rgba(43, 31, 24, 0.92); box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);">
              <p style="margin: 0 0 0.75rem; color: #f0b35a; font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;">Deployment check</p>
              <h1 style="margin: 0 0 1rem; font-size: clamp(2rem, 5vw, 3.25rem); line-height: 1;">Questboard did not finish loading.</h1>
              <p style="margin: 0 0 1rem; color: #e4d1b8; line-height: 1.6;">
                This page is serving the source <code style="color: #f8d49a;">/src/main.tsx</code> entrypoint instead of the built Vite files.
                On GitHub Pages, that usually means Pages is set to deploy from the repository branch instead of the GitHub Actions artifact.
              </p>
              <ol style="margin: 0 0 1rem 1.25rem; padding: 0; color: #f7efe1; line-height: 1.65;">
                <li>Open the repository on GitHub.</li>
                <li>Go to <strong>Settings → Pages</strong>.</li>
                <li>Set <strong>Build and deployment → Source</strong> to <strong>GitHub Actions</strong>.</li>
                <li>Go to <strong>Actions</strong> and rerun the Pages deployment workflow.</li>
              </ol>
              <p style="margin: 0; color: #bfa98d; line-height: 1.6;">
                If you use a custom domain or user/organization page, also set the repository variable
                <code style="color: #f8d49a;">VITE_BASE_PATH=/</code>.
              </p>
            </section>
          </main>
        `;
      }, 2000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

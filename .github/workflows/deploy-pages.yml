name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase config
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "::error::VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY must be set as github-pages environment variables, repository variables, or secrets before deploying."
            exit 1
          fi

      - name: Verify no committed build artifacts
        run: npm run verify:no-committed-build

      - name: Build
        run: npm run build

      - name: Verify Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          ! grep -q '<script type="module" src="/src/main.tsx"' dist/index.html
          test -n "$(find dist/assets -maxdepth 1 -type f -name '*.js' -print -quit)"
          repository_name="${GITHUB_REPOSITORY#*/}"
          repository_owner="${GITHUB_REPOSITORY%%/*}"
          expected_base="${VITE_BASE_PATH:-/${repository_name}/}"
          if [ "${VITE_BASE_PATH}" = "/" ] && [ "${repository_name}" != "${repository_owner}.github.io" ] && [ ! -f public/CNAME ]; then
            echo "::error::VITE_BASE_PATH=/ is for custom domains or user/organization pages. For https://${repository_owner}.github.io/${repository_name}/, remove VITE_BASE_PATH so assets build under /${repository_name}/."
            exit 1
          fi
          grep -q "src=\"${expected_base}assets/" dist/index.html
          grep -q "href=\"${expected_base}assets/" dist/index.html

      - name: Require Pages Actions source
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          pages_endpoint="/repos/${GITHUB_REPOSITORY}/pages"
          before_source="$(gh api "${pages_endpoint}" --jq '.build_type // "unknown"')"
          echo "Current GitHub Pages build_type: ${before_source}"

          if [ "${before_source}" != "workflow" ]; then
            echo "Attempting to switch GitHub Pages to GitHub Actions deployments."
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${pages_endpoint}" \
              -f build_type=workflow
          fi

          after_source="$(gh api "${pages_endpoint}" --jq '.build_type // "unknown"')"
          echo "Verified GitHub Pages build_type: ${after_source}"

          if [ "${after_source}" != "workflow" ]; then
            echo "::error::GitHub Pages is still configured for '${after_source}' instead of GitHub Actions. Set Settings -> Pages -> Build and deployment -> Source to GitHub Actions, or provide a PAGES_ADMIN_TOKEN secret with permission to manage GitHub Pages settings, then rerun this workflow."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live Pages deployment
        run: |
          page_url="${{ steps.deployment.outputs.page_url }}"
          for attempt in $(seq 1 12); do
            html="$(curl -fsSL "${page_url}")"
            if echo "${html}" | grep -q '<script type="module" src="/src/main.tsx"'; then
              echo "Attempt ${attempt}: GitHub Pages is still serving the unbuilt source index."
            elif echo "${html}" | grep -q '%BASE_URL%'; then
              echo "Attempt ${attempt}: GitHub Pages is still serving the unprocessed source index."
            elif echo "${html}" | grep -q '<script type="module" crossorigin src="'; then
              echo "Live Pages deployment is serving the built Vite artifact."
              exit 0
            else
              echo "Attempt ${attempt}: live page did not contain the expected Vite script tag yet."
            fi
            sleep 10
          done

          echo "::error::GitHub Pages did not serve the built artifact at ${page_url}. In Settings -> Pages, set Build and deployment -> Source to GitHub Actions, then rerun this workflow."
          exit 1
